<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - IGA Snack</title>
</head>
<body>
    <div class="login-container fondo-login">
        <h1>Iniciar Sesión</h1>
        <form id="loginForm">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Ingresar</button>
        </form>
        <p id="error-message" style="color: red; display: none;">Usuario o contraseña incorrectos.</p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === "16641" && password === "DAMV") {
                localStorage.setItem('isLoggedIn', 'true'); 
                window.location.href = "perfil.html"; 
            } else if (username === "16648" && password === "LFPF16") {
                localStorage.setItem('isLoggedIn', 'true'); 
                window.location.href = "Admin.html"; 
            } else {
                document.getElementById('error-message').style.display = 'block'; 
            }
        });
    </script>
</body>
</html>
